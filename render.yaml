services:
- type: web
name: n8n-resume
runtime: docker
plan: free
dockerfilePath: ./Dockerfile
envVars:
- key: N8N_HOST
sync: false
- key: N8N_PORT
value: 5678
- key: N8N_PROTOCOL
value: https
- key: WEBHOOK_URL
sync: false
- key: N8N_ENCRYPTION_KEY
sync: false
- key: N8N_USER_MANAGEMENT_JWT_SECRET
sync: false
